<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>应用详情 - 软件下载中心</title>
    <meta name="description" content="查看应用详情、版本历史和 APK 下载信息" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="download-page">
    <main class="download-shell app-detail-shell">
      <header class="download-nav">
        <a class="brand-lockup" href="/" aria-label="软件下载中心">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>软件下载中心</span>
        </a>
        <a class="admin-link" href="/upload">上传管理</a>
      </header>

      <section class="detail-hero" aria-labelledby="app-title">
        <div id="detail-feature" class="detail-feature"></div>
        <div class="detail-hero-copy">
          <div id="detail-icon" class="app-icon featured-icon" aria-hidden="true"></div>
          <p id="detail-category" class="detail-category">Android</p>
          <h1 id="app-title">正在读取</h1>
          <p id="detail-short" class="summary">正在读取应用详情...</p>
          <div id="detail-tags" class="tag-list"></div>
          <div class="download-actions">
            <a id="detail-download" class="button primary download-cta" href="#">下载 APK</a>
            <a class="button ghost" href="/">返回列表</a>
          </div>
        </div>
      </section>

      <section class="detail-grid" aria-label="应用详细信息">
        <article class="detail-panel description-panel">
          <h2>应用介绍</h2>
          <p id="detail-description" class="long-text">暂无详细介绍。</p>
          <div id="detail-links" class="link-list"></div>
        </article>

        <aside class="detail-panel">
          <h2>文件信息</h2>
          <dl class="info-list">
            <div><dt>版本</dt><dd id="detail-version">-</dd></div>
            <div><dt>大小</dt><dd id="detail-size">-</dd></div>
            <div><dt>发布日期</dt><dd id="detail-release-date">-</dd></div>
            <div><dt>文件名</dt><dd id="detail-file-name">-</dd></div>
            <div><dt>SHA-256</dt><dd id="detail-sha" class="mono-text">-</dd></div>
          </dl>
        </aside>

        <article class="detail-panel">
          <h2>应用信息</h2>
          <dl class="info-list">
            <div><dt>开发者</dt><dd id="detail-developer">-</dd></div>
            <div><dt>包名</dt><dd id="detail-package-name">-</dd></div>
            <div><dt>最低 Android</dt><dd id="detail-min-android">-</dd></div>
            <div><dt>权限说明</dt><dd id="detail-permissions">-</dd></div>
          </dl>
        </article>

        <article class="detail-panel">
          <h2>更新日志</h2>
          <p id="detail-release-notes" class="long-text">暂无更新日志。</p>
        </article>
      </section>

      <section class="detail-panel media-panel" aria-labelledby="screenshots-title">
        <h2 id="screenshots-title">应用截图</h2>
        <div id="screenshot-list" class="screenshot-list"></div>
      </section>

      <section class="detail-panel versions-panel" aria-labelledby="versions-title">
        <h2 id="versions-title">版本历史</h2>
        <div id="version-list" class="version-list"></div>
      </section>
    </main>

    <script src="/app-detail.js" type="module"></script>
  </body>
</html>
